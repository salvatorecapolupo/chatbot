<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat Psicologo Rogersiano</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; padding: 20px; }
    .chat-box {
      height: 500px;
      overflow-y: auto;
      background: #ffffff;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #dee2e6;
    }
    .msg {
      max-width: 75%;
      padding: 10px 15px;
      border-radius: 15px;
      margin-bottom: 10px;
    }
    .user-msg {
      background-color: #e2f0fb;
      text-align: left;
      align-self: flex-start;
    }
    .bot-msg {
      background-color: #d1f2e0;
      text-align: left;
      align-self: flex-end;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 class="mb-4 text-center">Parla con lo Psicologo Rogersiano</h2>

  <div class="chat-box d-flex flex-column mb-3" id="chatbox">
    <!-- Messaggi qui -->
  </div>

  <div class="input-group">
    <input type="text" id="userInput" class="form-control" placeholder="Scrivi qualcosa..." aria-label="Messaggio">
    <button class="btn btn-success" onclick="sendMessage()">Invia</button>
  </div>
</div>

<script>
  const chatbox = document.getElementById("chatbox");
  const history = [];

  const emotions = {
    "triste": ["triste", "giù", "depress*", "abbattuto", "sconsolato"],
    "felice": ["felice", "content*", "gioios*", "sollevato"],
    "ansioso": ["ansioso", "agitato", "in ansia", "preoccupato", "teso"],
    "confuso": ["confuso", "disorientato", "non so", "incerto"],
    "solo": ["solo", "isolato", "abbandonato", "incompreso"],
    "spaventato": ["spaventato", "pauroso", "terrorizzato", "inquieto"]
  };

  const reflections = [
    (f) => `Sento che stai provando qualcosa legato al sentirti ${f}. Ti va di raccontarmi meglio?`,
    (f) => `Quando dici che ti senti ${f}, cosa succede dentro di te?`,
    (f) => `Essere ${f} può avere molte sfumature... quale ti risuona di più in questo momento?`,
    (f) => `Mi sembra che il sentirsi ${f} abbia un ruolo importante in ciò che stai vivendo.`,
    (f) => `Hai nominato il sentirti ${f}. Vorrei restare un momento lì con te, se vuoi.`
  ];

  const genericResponses = [
    (t) => `Ti ho ascoltato mentre dicevi: "${t}". Come ti sei sentito nel dirlo?`,
    () => `Apprezzo che tu stia condividendo questo. Cosa significa per te?`,
    () => `Resto qui con te. Vuoi esplorare meglio cosa senti ora?`,
    () => `Mi interessa davvero comprendere il tuo vissuto. Raccontami ancora.`,
    () => `Hai espresso qualcosa di autentico. Posso chiederti cosa ti ha spinto a farlo adesso?`
  ];

  function appendMessage(text, sender) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `msg ${sender === 'user' ? 'user-msg align-self-start' : 'bot-msg align-self-end'}`;
    msgDiv.textContent = text;
    chatbox.appendChild(msgDiv);
    chatbox.scrollTop = chatbox.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (text === "") return;
    appendMessage(text, "user");
    history.push(text);
    input.value = "";
    setTimeout(() => respond(text), 700);
  }

  function detectEmotion(text) {
    const lowerText = text.toLowerCase();
    for (const [emotion, keywords] of Object.entries(emotions)) {
      for (const keyword of keywords) {
        const pattern = new RegExp(keyword.replace("*", ".*"), "i");
        if (pattern.test(lowerText)) {
          return emotion;
        }
      }
    }
    return null;
  }

  function respond(userText) {
    const emotion = detectEmotion(userText);
    let response;

    if (emotion) {
      const variation = reflections[Math.floor(Math.random() * reflections.length)];
      response = variation(emotion);
    } else if (userText.includes("?")) {
      response = "È una domanda importante quella che poni. Che significato ha per te?";
    } else {
      const generic = genericResponses[Math.floor(Math.random() * genericResponses.length)];
      response = generic(userText);
    }

    const lastEmotion = detectEmotion(history[history.length - 2] || "");
    if (lastEmotion && lastEmotion === emotion) {
      response += " È un sentimento che sembra ripresentarsi spesso. Vuoi restare un attimo su questo?";
    }

    appendMessage(response, "bot");
  }
</script>

</body>
</html>
