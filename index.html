<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Chat Psicologo Rogersiano</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    #chatbox { border: 1px solid #ccc; background: white; padding: 10px; height: 400px; overflow-y: auto; }
    .message { margin: 10px 0; }
    .user { text-align: right; color: blue; }
    .bot { text-align: left; color: green; }
    #inputArea { margin-top: 10px; }
  </style>
</head>
<body>
  <h2>Chat con lo Psicologo Rogersiano</h2>
  <div id="chatbox"></div>
  <div id="inputArea">
    <input type="text" id="userInput" placeholder="Scrivi qui..." size="50">
    <button onclick="sendMessage()">Invia</button>
  </div>

  <script>
    const chatbox = document.getElementById("chatbox");

    function appendMessage(text, sender) {
      const msg = document.createElement("div");
      msg.className = "message " + sender;
      msg.textContent = text;
      chatbox.appendChild(msg);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById("userInput");
      const text = input.value.trim();
      if (text === "") return;
      appendMessage(text, "user");
      input.value = "";
      setTimeout(() => respond(text), 600);
    }

    function respond(userText) {
      const response = rogersianReflect(userText);
      appendMessage(response, "bot");
    }

    function rogersianReflect(text) {
      const feelings = ["triste", "felice", "ansioso", "confuso", "solo", "spaventato"];
      const lowerText = text.toLowerCase();
      const feeling = feelings.find(f => lowerText.includes(f));

      if (feeling) {
        return `Capisco che ti senti ${feeling}. Vuoi parlarmi di più di questo?`;
      }

      if (text.includes("?")) {
        return "Mi sembra che tu stia cercando delle risposte importanti. Vuoi esplorarlo insieme?";
      }

      return `Mi stai dicendo: "${text}". Mi interessa molto capire cosa provi dicendolo.`;
    }
  </script>
</body>
</html>
